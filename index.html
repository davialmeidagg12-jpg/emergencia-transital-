<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergência Transital</title>
    <!-- Biblioteca do Leitor de QR Code -->
    <script src="https://unpkg.com"></script>
    <style>
        :root { --amarelo: #ffcc00; --vermelho: #d90429; --verde: #25d366; --fundo: #121212; --card: #1e1e1e; }
        body { font-family: sans-serif; background: var(--fundo); color: white; margin: 0; padding-bottom: 80px; }
        header { background: var(--amarelo); color: black; padding: 15px; text-align: center; font-weight: bold; position: sticky; top: 0; z-index: 100; }
        
        .page { display: none; padding: 20px; animation: fadeIn 0.3s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .btn { display: flex; align-items: center; justify-content: center; gap: 15px; padding: 20px; border: none; border-radius: 15px; font-size: 18px; font-weight: bold; color: white; text-decoration: none; margin-bottom: 15px; width: 100%; box-sizing: border-box; }
        .emergencia { background: var(--vermelho); }
        .zap { background: var(--verde); }

        /* Estilo da Câmera */
        #reader { width: 100%; border-radius: 15px; overflow: hidden; margin-top: 10px; background: #000; }
        #resultado-scan { margin-top: 20px; padding: 15px; background: var(--card); border-radius: 10px; border: 2px solid var(--amarelo); display: none; }

        nav { position: fixed; bottom: 0; width: 100%; background: #1a1a1a; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #333; }
        nav button { background: none; border: none; color: #888; font-size: 10px; display: flex; flex-direction: column; align-items: center; }
        nav button.active-nav { color: var(--amarelo); }
        .nav-icon { font-size: 22px; margin-bottom: 4px; }
    </style>
</head>
<body>

    <header>Emergência Transital</header>

    <!-- PÁGINA 1: HOME -->
    <div id="home" class="page active">
        <a href="tel:191" class="btn emergencia"><span>📞</span> LIGAR POLÍCIA (191)</a>
        <a href="#" id="btn-zap" class="btn zap"><span>📍</span> ENVIAR LOCALIZAÇÃO</a>
    </div>

    <!-- PÁGINA 2: LEITOR QR (IA DE PLACAS) -->
    <div id="scan" class="page">
        <h2 style="text-align: center;">Identificar Placa</h2>
        <p style="font-size: 14px; text-align: center;">Aponte a câmera para o QR Code da placa para saber o significado.</p>
        <div id="reader"></div>
        <div id="resultado-scan">
            <h3 id="placa-nome" style="color:var(--amarelo); margin-top:0;"></h3>
            <p id="placa-desc"></p>
            <button onclick="reiniciarScanner()" style="background:var(--amarelo); border:none; padding:10px; border-radius:5px; font-weight:bold;">Escanear Outra</button>
        </div>
    </div>

    <!-- PÁGINA 3: CHECKLIST -->
    <div id="checklist" class="page">
        <h2>Checklist de Segurança</h2>
        <div style="background:#1e1e1e; padding:15px; border-radius:10px; margin-bottom:10px;">✅ Conferir Pneus e Estepe</div>
        <div style="background:#1e1e1e; padding:15px; border-radius:10px; margin-bottom:10px;">✅ Verificar Nível de Óleo</div>
    </div>

    <!-- MENU -->
    <nav>
        <button onclick="showPage('home', this)" class="active-nav"><span class="nav-icon">🚨</span>Início</button>
        <button onclick="showPage('scan', this)"><span class="nav-icon">📷</span>Câmera</button>
        <button onclick="showPage('checklist', this)"><span class="nav-icon">📋</span>Checklist</button>
    </nav>

    <script>
        function showPage(pageId, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-nav'));
            btn.classList.add('active-nav');
            
            // Inicia a câmera se for a página de scan
            if(pageId === 'scan') { iniciarScanner(); } else { pararScanner(); }
        }

        let html5QrCode;

        function iniciarScanner() {
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: { width: 250, height: 250 } },
                (decodedText) => {
                    document.getElementById('reader').style.display = 'none';
                    document.getElementById('resultado-scan').style.display = 'block';
                    // Aqui simulamos a IA processando o texto do QR Code
                    processarResultado(decodedText);
                    html5QrCode.stop();
                }
            ).catch(err => console.log("Erro na câmera", err));
        }

        function processarResultado(texto) {
            const nome = document.getElementById('placa-nome');
            const desc = document.getElementById('placa-desc');
            
            // Exemplo de como a "IA" vai ler os códigos
            if(texto.toLowerCase().includes("pare")) {
                nome.innerText = "🛑 R-1: Parada Obrigatória";
                desc.innerText = "Você deve parar totalmente o veículo antes de entrar no cruzamento.";
            } else if(texto.toLowerCase().includes("obras")) {
                nome.innerText = "🚧 A-24: Obras";
                desc.innerText = "Atenção! Existem homens ou máquinas trabalhando na pista adiante.";
            } else {
                nome.innerText = "Placa Identificada";
                desc.innerText = "Informação encontrada: " + texto;
            }
        }

        function reiniciarScanner() {
            document.getElementById('reader').style.display = 'block';
            document.getElementById('resultado-scan').style.display = 'none';
            iniciarScanner();
        }

        function pararScanner() {
            if(html5QrCode) { html5QrCode.stop().catch(() => {}); }
        }

        // Localização Zap
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(p => {
                document.getElementById('btn-zap').href = `https://api.whatsapp.com! Minha localização: https://www.google.com{p.coords.latitude},${p.coords.longitude}`;
            });
        }
    </script>
</body>
</html>
