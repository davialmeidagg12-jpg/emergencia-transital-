<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Emergência Transital PRO</title>
    <script src="https://unpkg.com"></script>

    <style>
        :root { 
            --amarelo: #ffcc00; --vermelho: #d90429; --verde: #2ecc71; 
            --fundo: #121212; --card: #1e1e1e; --texto: #ffffff;
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: var(--fundo); color: var(--texto); 
            margin: 0; padding-bottom: 95px; overflow-x: hidden;
            display: flex; flex-direction: column; align-items: center;
        }
        
        header { 
            background: var(--amarelo); color: #000; padding: 15px; 
            text-align: center; font-weight: 900; font-size: 18px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); position: sticky; top: 0; width: 100%; z-index: 1000;
        }

        .content { padding: 15px; width: 100%; max-width: 500px; box-sizing: border-box; }
        .page { display: none; animation: fadeIn 0.3s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

        .btn-base { 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 8px; border: none; border-radius: 15px; font-weight: 800; color: white; 
            min-height: 110px; padding: 10px; cursor: pointer; transition: 0.2s; width: 100%; 
            text-transform: uppercase; box-sizing: border-box; font-size: 11px;
        }
        .btn-base:active { transform: scale(0.95); }
        .btn-base span { font-size: 35px; }

        .bg-vermelho { background: var(--vermelho); }
        .bg-verde { background: var(--verde); }
        .bg-roxo { background: #9b59b6; }
        .bg-rosa { background: #e91e63; }
        .bg-azul { background: #2980b9; }

        /* ESTILO QUIZ TURBO */
        .quiz-container { background: #1e1e1e; padding: 20px; border-radius: 20px; text-align: center; border: 1px solid #333; }
        .quiz-placa { font-size: 90px; margin: 15px 0; display: block; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5)); }
        .opcao-btn { 
            width: 100%; padding: 16px; margin: 8px 0; border-radius: 12px; border: 2px solid #333;
            background: #252525; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 14px;
        }
        .correto { background: var(--verde) !important; border-color: white !important; transform: scale(1.02); }
        .errado { background: var(--vermelho) !important; border-color: white !important; }

        nav { 
            position: fixed; bottom: 0; width: 100%; max-width: 500px;
            background: #1a1a1a; display: flex; justify-content: space-around; 
            padding: 10px 0; border-top: 1px solid #333; z-index: 1000; 
        }
        nav button { background: none; border: none; color: #777; font-size: 10px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        nav button.active-nav { color: var(--amarelo); font-weight: bold; }
        .nav-icon { font-size: 20px; }

        input { width: 100%; padding: 18px; margin-bottom: 12px; border-radius: 12px; border: 1px solid #444; background: #222; color: white; box-sizing: border-box; }
    </style>
</head>
<body>

<header>🛡️ EMERGÊNCIA TRANSITAL PRO</header>

<div class="content">
    
    <!-- INÍCIO -->
    <div id="home" class="page active">
        <div style="background: #1e1e1e; padding: 15px; border-radius: 15px; margin-bottom: 20px; border-left: 5px solid var(--amarelo);">
            <h3 style="margin:0; font-size: 14px; color: var(--amarelo);">SISTEMA ATIVO</h3>
            <p style="margin:5px 0 0 0; font-size: 12px; color: #aaa;">Painel de Controle e Monitoramento.</p>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <a href="tel:191" class="btn-base bg-vermelho"><span>🚨</span> POLÍCIA</a>
            <a href="tel:193" class="btn-base bg-vermelho" style="background:#b91c1c;"><span>🚑</span> BOMBEIROS</a>
            <button onclick="enviarZap()" class="btn-base bg-verde"><span>📍</span> ZAP LOCAL</button>
            <button onclick="showPage('quiz', document.getElementById('nav-quiz'))" class="btn-base bg-roxo"><span>📝</span> SIMULADO</button>
            <button onclick="showPage('mapa', document.getElementById('nav-mapa'))" class="btn-base bg-azul" style="grid-column: span 2; min-height: 80px; flex-direction: row; gap: 15px;">
                <span>🗺️</span> <b>VER MAPA E TRÂNSITO</b>
            </button>
        </div>
    </div>

    <!-- QUIZ -->
    <div id="quiz" class="page">
        <h3 style="text-align:center; color: var(--amarelo);">DESAFIO CNH PRO</h3>
        <div class="quiz-container">
            <div id="quiz-box">
                <span id="placa-img" class="quiz-placa">🛑</span>
                <p id="pergunta-texto" style="font-weight: bold; margin-bottom: 20px; min-height: 40px;">O que esta placa indica?</p>
                <div id="opcoes"></div>
            </div>
            <div style="margin-top:20px; display: flex; justify-content: space-between; align-items: center;">
                <p id="quiz-status" style="font-size:12px; color: #888; margin:0;"></p>
                <p id="quiz-score" style="font-size:12px; color: var(--verde); font-weight: bold; margin:0;"></p>
            </div>
        </div>
    </div>

    <!-- IDOSO -->
    <div id="idoso" class="page">
        <div style="text-align: center; margin-bottom: 25px;">
            <span style="font-size: 50px;">👴</span>
            <h2 style="color: var(--amarelo); margin: 10px 0;">Modo Auxílio</h2>
        </div>
        <div style="display: flex; flex-direction: column; gap: 20px;">
            <a href="tel:191" class="btn-base bg-vermelho" style="min-height: 160px; font-size: 18px; border: 3px solid white;"><span>🚨</span> LIGAR POLÍCIA</a>
            <button onclick="ligarFamilia()" class="btn-base bg-rosa" style="min-height: 160px; font-size: 18px;"><span>❤️</span> FAMÍLIA</button>
        </div>
    </div>

    <!-- FAMÍLIA -->
    <div id="familia" class="page">
        <h3 style="text-align:center; color: var(--amarelo);">CONTATO</h3>
        <input type="tel" id="tel-familia" placeholder="DDD + Número">
        <button onclick="salvarFamilia()" class="btn-base bg-verde" style="min-height: 60px;">💾 SALVAR</button>
    </div>

    <!-- MAPA -->
    <div id="mapa" class="page" style="height: 65vh;">
        <iframe id="google-maps" width="100%" height="100%" style="border:0; border-radius: 20px;"></iframe>
    </div>

</div>

<nav>
    <button onclick="showPage('home', this)" class="active-nav"><span class="nav-icon">🚨</span>Início</button>
    <button onclick="showPage('idoso', this)"><span class="nav-icon">👴</span>Idoso</button>
    <button id="nav-quiz" onclick="showPage('quiz', this)"><span class="nav-icon">📝</span>Simulado</button>
    <button onclick="showPage('familia', this)"><span class="nav-icon">❤️</span>Família</button>
    <button id="nav-mapa" onclick="showPage('mapa', this)"><span class="nav-icon">🗺️</span>Mapa</button>
</nav>

<script>
    // BANCO DE DADOS AMPLIADO
    const perguntasOriginal = [
        { placa: "🛑", correta: "Parada Obrigatória", opcoes: ["Pare se vier carro", "Parada Obrigatória", "Dê a preferência"] },
        { placa: "🚫", correta: "Sentido Proibido", opcoes: ["Sentido Proibido", "Pare", "Proibido Estacionar"] },
        { placa: "⚠️", correta: "Advertência Geral", opcoes: ["Atenção", "Obras", "Advertência Geral"] },
        { placa: "🔞", correta: "Proibido menores de 18", opcoes: ["Proibido menores de 18", "Velocidade Máxima", "Sentido Proibido"] },
        { placa: "🅿️", correta: "Estacionamento Regulamentado", opcoes: ["Pare", "Estacionamento Regulamentado", "Proibido Parar"] },
        { placa: "🛤️", correta: "Passagem de Nível", opcoes: ["Ponte", "Passagem de Nível", "Cruzamento"] },
        { placa: "🚴", correta: "Passagem de Ciclistas", opcoes: ["Proibido Bicicleta", "Passagem de Ciclistas", "Ciclovia à Frente"] },
        { placa: "🚶", correta: "Trânsito de Pedestres", opcoes: ["Passagem Protegida", "Trânsito de Pedestres", "Cuidado Crianças"] },
        { placa: "⛽", correta: "Abastecimento", opcoes: ["Abastecimento", "Mecânico", "Posto de Saúde"] },
        { placa: "🍴", correta: "Restaurante", opcoes: ["Hotel", "Cozinha", "Restaurante"] },
        { placa: "📶", correta: "Área com sinal Wi-fi", opcoes: ["Radar", "Área com sinal Wi-fi", "Torre de Celular"] },
        { placa: "🚸", correta: "Área Escolar", opcoes: ["Cuidado Crianças", "Área Escolar", "Parque Infantil"] },
        { placa: "🐄", correta: "Animais", opcoes: ["Fazenda", "Animais na Pista", "Animais"] },
        { placa: "🏹", correta: "Patrimônio Histórico", opcoes: ["Museu", "Patrimônio Histórico", "Teatro"] },
        { placa: "🏥", correta: "Hospital", opcoes: ["Ambulância", "Hospital", "Farmácia"] }
    ];

    let perguntas = [];
    let perguntaAtual = 0;
    let acertos = 0;

    function iniciarQuiz() {
        perguntas = [...perguntasOriginal].sort(() => Math.random() - 0.5); // Embaralha
        perguntaAtual = 0;
        acertos = 0;
        carregarPergunta();
    }

    function carregarPergunta() {
        const p = perguntas[perguntaAtual];
        document.getElementById('placa-img').innerText = p.placa;
        const divOpcoes = document.getElementById('opcoes');
        divOpcoes.innerHTML = "";
        
        // Embaralha as opções também
        const opcoesEmbaralhadas = [...p.opcoes].sort(() => Math.random() - 0.5);

        opcoesEmbaralhadas.forEach(opcao => {
            const btn = document.createElement('button');
            btn.className = 'opcao-btn';
            btn.innerText = opcao;
            btn.onclick = () => verificarResposta(opcao, btn);
            divOpcoes.appendChild(btn);
        });
        document.getElementById('quiz-status').innerText = `Placa ${perguntaAtual + 1} de ${perguntas.length}`;
        document.getElementById('quiz-score').innerText = `Acertos: ${acertos}`;
    }

    function verificarResposta(escolha, btn) {
        const correta = perguntas[perguntaAtual].correta;
        const todosBotoes = document.querySelectorAll('.opcao-btn');
        todosBotoes.forEach(b => b.disabled = true);

        if(escolha === correta) {
            btn.classList.add('correto');
            acertos++;
        } else {
            btn.classList.add('errado');
            todosBotoes.forEach(b => { if(b.innerText === correta) b.classList.add('correto'); });
        }

        setTimeout(() => {
            perguntaAtual++;
            if(perguntaAtual < perguntas.length) {
                carregarPergunta();
            } else {
                alert(`Fim do Simulado! Você acertou ${acertos} de ${perguntas.length}.`);
                iniciarQuiz();
            }
        }, 1200);
    }

    // NAVEGAÇÃO
    function showPage(pageId, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-nav'));
        document.getElementById(pageId).classList.add('active');
        if(btn) btn.classList.add('active-nav');
        if(pageId === 'quiz') iniciarQuiz();
        if(pageId === 'mapa') carregarMapa();
    }

    function salvarFamilia() {
        const num = document.getElementById('tel-familia').value;
        if(num) { localStorage.setItem('telFamilia', num); alert('Número salvo!'); }
    }

    function ligarFamilia() {
        const num = localStorage.getItem('telFamilia');
        if(num) window.location.href = "tel:" + num;
        else alert('Configure o número primeiro!');
    }

    function enviarZap() { window.open("https://wa.me de ajuda!", "_blank"); }

    function carregarMapa() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(p => {
                document.getElementById('google-maps').src = `https://maps.google.com{p.coords.latitude},${p.coords.longitude}&z=15&output=embed`;
            });
        }
    }
</script>
</body>
</html>
